<script>
  // API key management
  let ANTHROPIC_API_KEY = localStorage.getItem('on_poll_api_key') || '';
  if (ANTHROPIC_API_KEY) {
    document.getElementById('api-key-input').value = ANTHROPIC_API_KEY;
    document.getElementById('api-status').textContent = '✓ API-sleutel geladen';
    document.getElementById('api-status').className = 'ok';
  }
  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val.startsWith('sk-')) {
      document.getElementById('api-status').textContent = 'Ongeldige sleutel — moet beginnen met sk-ant-...';
      document.getElementById('api-status').className = '';
      return;
    }
    ANTHROPIC_API_KEY = val;
    localStorage.setItem('on_poll_api_key', val);
    document.getElementById('api-status').textContent = '✓ Opgeslagen';
    document.getElementById('api-status').className = 'ok';
  }
  // Make key available to React
  window.getApiKey = () => ANTHROPIC_API_KEY;
</script>

// ── Fuzzy search: score a poll against a topic ────────────────────────────────
function scorePoll(poll, topic) {
  const topicWords = topic.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  const haystack = (poll.title + " " + poll.question + " " + poll.answers.map(a => a.label).join(" ")).toLowerCase();
  let score = 0;
  for (const w of topicWords) {
    if (haystack.includes(w)) score += 3;
    // partial match
    for (const hw of haystack.split(/\s+/)) {
      if (hw.includes(w) || w.includes(hw)) score += 1;
    }
  }
  return score;
}

function findRelatedPolls(topic, max = 3) {
  if (!topic.trim()) return [];
  const scored = HISTORISCHE_POLLS.map(p => ({ poll: p, score: scorePoll(p, topic) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, max)
    .map(x => x.poll);
  return scored;
}

// ── Visual balance indicator ──────────────────────────────────────────────────
function getBalanceLabel(answers) {
  const pcts = answers.map(a => a.pct);
  const max = Math.max(...pcts);
  if (max < 65) return { emoji: "🟢", color: "#22c55e", text: "Verdeeld" };
  if (max < 80) return { emoji: "🟡", color: "#eab308", text: "Licht eenzijdig" };
  return { emoji: "🔴", color: "#ef4444", text: "Eenzijdig" };
}

    histCard: { background: "#13131a", border: "1px solid #1e1e28", borderLeft: "4px solid #3a3a5a", padding: "14px 16px", marginBottom: "10px", borderRadius: "2px" },
  };

  return (
    <div style={s.page}>
      {/* Header */}
      <div style={s.header}>
        <div style={{ fontSize: "10px", letterSpacing: "4px", textTransform: "uppercase", color: "#c8a84b", marginBottom: "3px" }}>Ongehoord Nederland — Redactietool</div>
        <h1 style={{ margin: 0, fontSize: "28px", fontWeight: "bold", color: "#fff" }}>Poll<span style={{ color: "#c8a84b" }}>Generator</span></h1>
      </div>

      {/* Tab nav */}
      <div style={{ display: "flex", borderBottom: "1px solid #1e1e28", padding: "0 36px", background: "#0f0f12" }}>
        {[["generator", "Poll genereren"], ["archief", "Archief overzicht"], ["opkomst", "Opkomst"]].map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)} style={{
            background: "none", border: "none", borderBottom: tab === key ? "2px solid #c8a84b" : "2px solid transparent",
            color: tab === key ? "#c8a84b" : "#555", fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase",
            padding: "10px 20px 8px", cursor: "pointer", fontFamily: "inherit", marginBottom: "-1px",
          }}>{label}</button>
        ))}
      </div>

      <div style={s.main}>

        {/* ── ARCHIEF TAB ────────────────────────────────── */}
        {tab === "archief" && (() => {
          // Normalize for accent-insensitive search
          const norm = s => s.toLowerCase()
            .replace(/[ëéê]/g,"e").replace(/[ïî]/g,"i")
            .replace(/[üû]/g,"u").replace(/[äâ]/g,"a").replace(/[öô]/g,"o");

          const zoekTerm = norm(archiefZoek.trim());

          // Search: filter ONLY matching polls, sorted by date desc
          const zoekResultaten = zoekTerm.length > 1
            ? HISTORISCHE_POLLS
                .filter(p =>
                  norm(p.question).includes(zoekTerm) ||
                  p.answers.some(a => norm(a.label).includes(zoekTerm))
                )
                .map(p => ({ ...p, max: Math.max(...p.answers.map(a => a.pct)) }))
                .sort((a, b) => b.date.localeCompare(a.date))
            : null;

          // Thema filter (only when not searching)
          const themaPolls = !zoekTerm && thema
            ? HISTORISCHE_POLLS
                .filter(p => {
                  const t = archiveStats.THEMAS.find(t => t.id === thema);
                  return t.keywords.some(kw => norm(p.question).includes(kw));
                })
                .map(p => ({ ...p, max: Math.max(...p.answers.map(a => a.pct)) }))
            : null;

          const PollCard = ({ poll, accentColor }) => (
            <div style={{ background: "#13131a", border: "1px solid #1e1e28", borderLeft: `4px solid ${accentColor}`, padding: "12px 14px", marginBottom: "10px", borderRadius: "2px" }}>
              <div style={{ fontSize: "10px", color: "#555", marginBottom: "5px" }}>{poll.date} · {poll.total.toLocaleString()} stemmen</div>
              <div style={{ fontSize: "13px", color: "#d8d0c0", fontWeight: "bold", lineHeight: 1.4, marginBottom: "8px" }}>{poll.question}</div>
              {poll.answers.map((ans, j) => (
                <div key={j} style={{ marginBottom: "5px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "2px" }}>
                    <span style={{ fontSize: "11px", color: "#a09888", maxWidth: "78%" }}>{ans.label}</span>
                    <span style={{ fontSize: "11px", color: accentColor, fontWeight: "bold" }}>{ans.pct}%</span>
                  </div>
                  <div style={{ background: "#1e1e28", borderRadius: "2px", height: "5px" }}>
                    <div style={{ width: `${ans.pct}%`, height: "100%", background: accentColor, opacity: j === 0 ? 1 : j === 1 ? 0.45 : 0.25 }} />
                  </div>
                </div>
              ))}
              {poll.max !== undefined && (
                <div style={{ marginTop: "6px", fontSize: "11px", color: accentColor, opacity: 0.8 }}>
                  Meest gekozen antwoord: {poll.max.toFixed(1)}%
                </div>
              )}
            </div>
          );

          return (
            <div>
              {/* Zoekbalk */}
              <div style={{ marginBottom: "20px" }}>
                <div style={{ position: "relative" }}>
                  <input
                    value={archiefZoek}
                    onChange={e => { setArchiefZoek(e.target.value); setThema(null); }}
                    placeholder="Zoek op trefwoord door alle 127 polls..."
                    style={{
                      width: "100%", background: "#1a1a20", border: "1px solid #2a2a35",
                      borderRadius: "3px", color: "#e8e0d0", fontSize: "14px",
                      padding: "10px 36px 10px 14px", fontFamily: "inherit",
                      outline: "none", boxSizing: "border-box",
                    }}
                    onFocus={e => e.target.style.borderColor = "#c8a84b"}
                    onBlur={e => e.target.style.borderColor = "#2a2a35"}
                  />
                  {archiefZoek
                    ? <button onClick={() => setArchiefZoek("")} style={{ position: "absolute", right: "10px", top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#555", fontSize: "18px", cursor: "pointer", padding: "0 4px" }}>×</button>
                    : <span style={{ position: "absolute", right: "12px", top: "50%", transform: "translateY(-50%)", color: "#444", fontSize: "14px", pointerEvents: "none" }}>⌕</span>
                  }
                </div>
                {zoekResultaten && (
                  <div style={{ fontSize: "11px", color: "#555", marginTop: "6px" }}>
                    {zoekResultaten.length} {zoekResultaten.length === 1 ? "resultaat" : "resultaten"} voor "{archiefZoek}"
                    {zoekResultaten.length > 0 && " — gesorteerd op meest recent"}
                  </div>
                )}
              </div>

              {/* Zoekresultaten */}
              {zoekTerm.length > 1 && zoekResultaten && (
                zoekResultaten.length === 0
                  ? <div style={{ color: "#555", fontSize: "13px", padding: "20px 0" }}>Geen polls gevonden voor "{archiefZoek}".</div>
                  : <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
                      {zoekResultaten.map(poll => (
                        <PollCard key={poll.id} poll={poll} accentColor={poll.max < 65 ? "#22c55e" : poll.max < 80 ? "#eab308" : "#ef4444"} />
                      ))}
                    </div>
              )}

              {/* Thema filter — alleen als niet aan het zoeken */}
              {zoekTerm.length <= 1 && (
                <div>
                  <div style={{ marginBottom: "20px" }}>
                    <div style={{ fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", color: "#c8a84b", marginBottom: "10px" }}>Filter op thema</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                      {archiveStats.THEMAS.map(t => (
                        <button key={t.id} onClick={() => setThema(thema === t.id ? null : t.id)} style={{
                          background: thema === t.id ? "#c8a84b" : "#16161c",
                          color: thema === t.id ? "#0f0f12" : "#a09888",
                          border: `1px solid ${thema === t.id ? "#c8a84b" : "#2a2a35"}`,
                          borderRadius: "2px", padding: "5px 12px", fontSize: "12px",
                          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
                        }}>{t.label}</button>
                      ))}
                    </div>
                  </div>

                  {/* Thema view */}
                  {thema && themaPolls && (
                    <div>
                      <div style={{ fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: "#c8a84b", marginBottom: "14px" }}>
                        {archiveStats.THEMAS.find(t => t.id === thema)?.label} — {themaPolls.length} polls
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
                        {themaPolls.sort((a, b) => a.max - b.max).map(poll => (
                          <PollCard key={poll.id} poll={poll} accentColor={poll.max < 65 ? "#22c55e" : poll.max < 80 ? "#eab308" : "#ef4444"} />
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Default: meest verdeeld + eenzijdig */}
                  {!thema && (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "24px" }}>
                      <div>
                        <div style={{ fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", color: "#22c55e", marginBottom: "12px" }}>🟢 Meest verdeeld</div>
                        {archiveStats.meestVerdeeld.map(poll => <PollCard key={poll.id} poll={poll} accentColor="#22c55e" />)}
                      </div>
                      <div>
                        <div style={{ fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", color: "#ef4444", marginBottom: "12px" }}>🔴 Meest eenzijdig</div>
                        {archiveStats.meestEenzijdig.map(poll => <PollCard key={poll.id} poll={poll} accentColor="#ef4444" />)}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {/* ── OPKOMST TAB ────────────────────────────────── */}
        {tab === "opkomst" && (() => {
          const [opkomstThema, setOpkomstThema] = [thema, setThema];

          const recentPolls = HISTORISCHE_POLLS.filter(p => p.date >= "2024-01-01");
          const filtered = opkomstThema
            ? (() => {
                const t = archiveStats.THEMAS.find(t => t.id === opkomstThema);
                return recentPolls.filter(p => t.keywords.some(kw => p.question.toLowerCase().includes(kw)));
              })()
            : recentPolls;

          const meeste = [...filtered].sort((a, b) => b.total - a.total).slice(0, 10);
          const minste = [...filtered].filter(p => p.total > 50).sort((a, b) => a.total - b.total).slice(0, 10);

          const PollCard = ({ poll, accentColor }) => (
            <div style={{ background: "#13131a", border: "1px solid #1e1e28", borderLeft: `4px solid ${accentColor}`, padding: "12px 14px", marginBottom: "10px", borderRadius: "2px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "5px" }}>
                <div style={{ fontSize: "10px", color: "#555" }}>{poll.date}</div>
                <div style={{ fontSize: "13px", fontWeight: "bold", color: accentColor, whiteSpace: "nowrap", marginLeft: "10px" }}>{poll.total.toLocaleString()} stemmen</div>
              </div>
              <div style={{ fontSize: "13px", color: "#d8d0c0", fontWeight: "bold", lineHeight: 1.4, marginBottom: "8px" }}>{poll.question}</div>
              {poll.answers.map((ans, j) => (
                <div key={j} style={{ marginBottom: "5px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "2px" }}>
                    <span style={{ fontSize: "11px", color: "#a09888", maxWidth: "78%" }}>{ans.label}</span>
                    <span style={{ fontSize: "11px", color: accentColor, fontWeight: "bold" }}>{ans.pct}%</span>
                  </div>
                  <div style={{ background: "#1e1e28", borderRadius: "2px", height: "5px" }}>
                    <div style={{ width: `${ans.pct}%`, height: "100%", background: accentColor, opacity: j === 0 ? 1 : j === 1 ? 0.45 : 0.25 }} />
                  </div>
                </div>
              ))}
            </div>
          );

          return (
            <div>
              {/* Thema filter */}
              <div style={{ marginBottom: "20px" }}>
                <div style={{ fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", color: "#c8a84b", marginBottom: "10px" }}>Filter op thema</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                  {archiveStats.THEMAS.map(t => (
                    <button key={t.id} onClick={() => setThema(thema === t.id ? null : t.id)} style={{
                      background: thema === t.id ? "#c8a84b" : "#16161c",
                      color: thema === t.id ? "#0f0f12" : "#a09888",
                      border: `1px solid ${thema === t.id ? "#c8a84b" : "#2a2a35"}`,
                      borderRadius: "2px", padding: "5px 12px", fontSize: "12px",
                      cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
                    }}>{t.label}</button>
                  ))}
                </div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "24px" }}>
                <div>
                  <div style={{ fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", color: "#c8a84b", marginBottom: "4px" }}>⬆ Meeste stemmen</div>
                  <div style={{ fontSize: "11px", color: "#555", marginBottom: "12px" }}>2024 – 2026{opkomstThema ? ` · ${archiveStats.THEMAS.find(t=>t.id===opkomstThema)?.label}` : ""}</div>
                  {meeste.length ? meeste.map(poll => <PollCard key={poll.id} poll={poll} accentColor="#c8a84b" />) : <div style={{color:"#555",fontSize:"13px"}}>Geen polls gevonden voor dit thema.</div>}
                </div>
                <div>
                  <div style={{ fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", color: "#4a6a8a", marginBottom: "4px" }}>⬇ Minste stemmen</div>
                  <div style={{ fontSize: "11px", color: "#555", marginBottom: "12px" }}>2024 – 2026{opkomstThema ? ` · ${archiveStats.THEMAS.find(t=>t.id===opkomstThema)?.label}` : ""}</div>
                  {minste.length ? minste.map(poll => <PollCard key={poll.id} poll={poll} accentColor="#4a6a8a" />) : <div style={{color:"#555",fontSize:"13px"}}>Geen polls gevonden voor dit thema.</div>}
                </div>
              </div>
            </div>
          );
        })()}

        {/* ── GENERATOR TAB ──────────────────────────────── */}
        {tab === "generator" && <>

        {/* Input row */}
        <div style={{ marginBottom: "28px" }}>
          <label style={s.label}>Onderwerp of actualiteit</label>
          <div style={{ display: "flex", gap: "10px", alignItems: "flex-start" }}>
            <textarea
              value={topic}
              onChange={e => setTopic(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); generate(); } }}
              placeholder="Bijv: NAVO-bijdrage, energieprijzen, kabinet Jetten, vleesbelasting..."
              rows={2}
              style={{ flex: 1, background: "#1a1a20", border: "1px solid #333", borderRadius: "3px", color: "#e8e0d0", fontSize: "14px", padding: "10px 12px", fontFamily: "inherit", resize: "none", outline: "none", lineHeight: 1.5 }}
            />
            <button
              onClick={generate}
              disabled={loading || !topic.trim()}
              style={{ background: loading || !topic.trim() ? "#252530" : "#c8a84b", color: loading || !topic.trim() ? "#555" : "#0f0f12", border: "none", borderRadius: "3px", padding: "10px 20px", fontSize: "12px", fontWeight: "bold", letterSpacing: "1px", textTransform: "uppercase", cursor: loading || !topic.trim() ? "not-allowed" : "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}
            >
              {loading ? "Laden..." : "Genereer →"}
            </button>
          </div>
          <div style={{ fontSize: "11px", color: "#555", marginTop: "6px" }}>
            Druk Enter of klik op de knop
          </div>
        </div>

        {/* Nieuws context */}
        <div style={{ marginBottom: "28px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "8px" }}>
            <label style={{ ...s.label, marginBottom: 0 }}>
              Nieuwsbericht of context
              <span style={{ color: "#3a3a4a", textTransform: "none", letterSpacing: 0, fontSize: "11px" }}> — optioneel</span>
            </label>
            <label style={{
              background: "#1a1a20", border: "1px solid #2a2a35", borderRadius: "3px",
              padding: "4px 10px", fontSize: "11px", color: fileLoading ? "#555" : "#a09888",
              cursor: fileLoading ? "not-allowed" : "pointer", whiteSpace: "nowrap",
              display: "flex", alignItems: "center", gap: "5px",
            }}>
              {fileLoading ? "⟳ laden..." : "↑ Upload PDF of Word"}
              <input
                type="file"
                accept=".pdf,.doc,.docx,.txt"
                style={{ display: "none" }}
                disabled={fileLoading}
                onChange={async e => {
                  const file = e.target.files[0];
                  if (!file) return;
                  setFileLoading(true);
                  setFileError(null);
                  try {
                    const ext = file.name.split(".").pop().toLowerCase();
                    if (ext === "txt") {
                      const text = await file.text();
                      setNewsContext(text.slice(0, 8000));
                    } else if (ext === "pdf") {
                      const base64 = await new Promise((res, rej) => {
                        const r = new FileReader();
                        r.onload = () => res(r.result.split(",")[1]);
                        r.onerror = rej;
                        r.readAsDataURL(file);
                      });
                      const resp = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "x-api-key": window.getApiKey(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
                        body: JSON.stringify({
                          model: "claude-sonnet-4-20250514",
                          max_tokens: 1000,
                          messages: [{ role: "user", content: [
                            { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
                            { type: "text", text: "Geef de volledige tekst van dit document terug, zonder opmaak of uitleg. Alleen de ruwe tekst." }
                          ]}],
                        }),
                      });
                      const data = await resp.json();
                      const text = data.content.map(b => b.text || "").join("").slice(0, 8000);
                      setNewsContext(text);
                    } else if (ext === "docx" || ext === "doc") {
                      if (!window.mammoth) {
                        await new Promise((res, rej) => {
                          const s = document.createElement("script");
                          s.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
                          s.onload = res; s.onerror = rej;
                          document.head.appendChild(s);
                        });
                      }
                      const arrayBuffer = await file.arrayBuffer();
                      const result = await window.mammoth.extractRawText({ arrayBuffer });
                      setNewsContext(result.value.slice(0, 8000));
                    } else {
                      setFileError("Bestandstype niet ondersteund. Gebruik PDF, Word of TXT.");
                    }
                  } catch {
                    setFileError("Bestand kon niet worden ingelezen. Probeer een ander bestand.");
                  } finally {
                    setFileLoading(false);
                    e.target.value = "";
                  }
                }}
              />
            </label>
            {fileError && <span style={{ fontSize: "11px", color: "#ef4444" }}>{fileError}</span>}
          </div>
          <div style={{ position: "relative" }}>
            <textarea
              value={newsContext}
              onChange={e => setNewsContext(e.target.value)}
              placeholder="Plak hier een nieuwsbericht, kop of alinea — of upload een PDF/Word bestand..."
              rows={3}
              style={{ width: "100%", background: "#1a1a20", border: "1px solid #252530", borderRadius: "3px", color: "#b0a898", fontSize: "13px", padding: "10px 12px", fontFamily: "inherit", resize: "vertical", outline: "none", lineHeight: 1.5, boxSizing: "border-box" }}
              onFocus={e => e.target.style.borderColor = "#3a3a50"}
              onBlur={e => e.target.style.borderColor = "#252530"}
            />
            {newsContext && (
              <button onClick={() => { setNewsContext(""); setFileError(null); }} style={{ position: "absolute", top: "8px", right: "10px", background: "none", border: "none", color: "#444", fontSize: "16px", cursor: "pointer", lineHeight: 1, padding: "2px 4px" }}>x</button>
            )}
          </div>
          {newsContext && (
            <div style={{ fontSize: "11px", color: "#555", marginTop: "4px" }}>
              {newsContext.length.toLocaleString()} tekens geladen
            </div>
          )}
        </div>

        {/* Two-column layout when we have content */}
        <div style={{ display: "grid", gridTemplateColumns: related.length ? "1fr 300px" : "1fr", gap: "28px", alignItems: "start" }}>

          {/* Left: generated polls */}
          <div>
            {error && <div style={{ background: "#2a1515", border: "1px solid #ef4444", padding: "12px 16px", color: "#ef4444", fontSize: "13px", marginBottom: "16px" }}>{error}</div>}

            {loading && (
              <div style={{ textAlign: "center", padding: "40px 0", color: "#c8a84b", fontSize: "13px", letterSpacing: "2px" }}>
                <div style={{ fontSize: "28px", marginBottom: "12px" }}>⟳</div>
                POLLVRAGEN GENEREREN...
              </div>
            )}

            {result && (
              <div>
                <div style={{ background: "#16161c", borderLeft: "3px solid #c8a84b", padding: "12px 16px", marginBottom: "18px", fontSize: "13px", color: "#9a9285", lineHeight: 1.6 }}>
                  <span style={{ color: "#c8a84b", fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase" }}>Analyse — </span>
                  {result.analysis}
                </div>

                {result.polls?.map((poll, i) => {
                  const info = labelInfo[poll.verwacht_label] || labelInfo["🟡"];
                  const sel = expanded === i;
                  const isRefining = refining === i;
                  const isRefineLoading = refineLoading === i;
                  const SNELLE_OPTIES = [
                    "Maak de vraag neutraler",
                    "Maak de vraag scherper / prikkelender",
                    "Voeg een derde antwoordoptie toe",
                    "Formuleer als persoonlijke ervaringsvraag",
                    "Maak de vraag meer verdeeld (40-60%)",
                    "Herformuleer als meerkeuzevraag",
                  ];
                  return (
                    <div key={i} style={{ ...s.card(sel), cursor: "default" }}>
                      {/* Header — klikbaar voor toelichting */}
                      <div onClick={() => setExpanded(sel ? null : i)} style={{ cursor: "pointer" }}>
                        <div style={{ display: "flex", gap: "10px", alignItems: "flex-start", marginBottom: "10px" }}>
                          <span style={{ background: "#0f0f12", color: "#c8a84b", fontSize: "10px", fontWeight: "bold", padding: "2px 7px", border: "1px solid #c8a84b30", minWidth: "22px", textAlign: "center" }}>#{i+1}</span>
                          <h3 style={{ margin: 0, fontSize: "15px", fontWeight: "bold", color: "#fff", lineHeight: 1.4, flex: 1 }}>{poll.vraag}</h3>
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", marginBottom: "8px", paddingLeft: "32px" }}>
                          {poll.antwoorden?.map((a, j) => (
                            <span key={j} style={{ background: "#0f0f12", border: "1px solid #2a2a35", padding: "3px 10px", fontSize: "12px", color: "#b0a898" }}>{a}</span>
                          ))}
                        </div>
                        <div style={{ paddingLeft: "32px", display: "flex", alignItems: "center", gap: "10px" }}>
                          <span style={{ fontSize: "12px", fontWeight: "bold", color: info.color }}>{poll.verwacht_label} {poll.verwachte_verdeling}</span>
                          <span style={{ fontSize: "10px", color: "#555" }}>{info.text}</span>
                        </div>
                        {sel && (
                          <div style={{ marginTop: "12px", paddingLeft: "32px", paddingTop: "12px", borderTop: "1px solid #2a2a35", fontSize: "12px", color: "#8a8275", lineHeight: 1.7 }}>
                            <span style={{ color: "#c8a84b", fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase" }}>Waarom verdeeld? — </span>
                            {poll.uitleg}
                          </div>
                        )}
                        {!sel && !isRefining && <div style={{ paddingLeft: "32px", marginTop: "6px" }}><span style={{ fontSize: "11px", color: "#3a3a4a" }}>klik voor toelichting ▾</span></div>}
                      </div>

                      {/* Pas aan knop */}
                      {!isRefining && (
                        <div style={{ paddingLeft: "32px", marginTop: "10px", paddingTop: "10px", borderTop: "1px solid #1e1e28" }}>
                          <button onClick={() => { setRefining(i); setExpanded(null); }} style={{
                            background: "none", border: "1px solid #2a2a35", borderRadius: "2px",
                            color: "#666", fontSize: "11px", padding: "4px 10px",
                            cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.5px",
                          }}>✎ Pas aan</button>
                        </div>
                      )}

                      {/* Verfijn paneel */}
                      {isRefining && (
                        <div style={{ paddingLeft: "32px", marginTop: "10px", paddingTop: "10px", borderTop: "1px solid #2a2a35" }}
                          onClick={e => e.stopPropagation()}>
                          <div style={{ fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: "#c8a84b", marginBottom: "8px" }}>Verfijn deze pollvraag</div>
                          {/* Snelle opties */}
                          <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", marginBottom: "10px" }}>
                            {SNELLE_OPTIES.map(opt => (
                              <button key={opt} onClick={() => refinePoll(i, opt)} disabled={isRefineLoading} style={{
                                background: "#0f0f12", border: "1px solid #2a2a35", borderRadius: "2px",
                                color: "#8a8275", fontSize: "11px", padding: "4px 9px",
                                cursor: isRefineLoading ? "not-allowed" : "pointer", fontFamily: "inherit",
                              }}>{opt}</button>
                            ))}
                          </div>
                          {/* Vrij tekstveld */}
                          <div style={{ display: "flex", gap: "8px" }}>
                            <input
                              value={refineInput[i] || ""}
                              onChange={e => setRefineInput(prev => ({ ...prev, [i]: e.target.value }))}
                              onKeyDown={e => { if (e.key === "Enter" && refineInput[i]?.trim()) refinePoll(i, refineInput[i]); }}
                              placeholder="Of typ een eigen instructie..."
                              disabled={isRefineLoading}
                              style={{ flex: 1, background: "#0f0f12", border: "1px solid #2a2a35", borderRadius: "2px", color: "#c8c0b0", fontSize: "12px", padding: "6px 10px", fontFamily: "inherit", outline: "none" }}
                            />
                            <button onClick={() => refineInput[i]?.trim() && refinePoll(i, refineInput[i])} disabled={isRefineLoading || !refineInput[i]?.trim()} style={{
                              background: isRefineLoading ? "#1a1a20" : "#c8a84b", color: isRefineLoading ? "#555" : "#0f0f12",
                              border: "none", borderRadius: "2px", padding: "6px 12px", fontSize: "11px",
                              fontWeight: "bold", cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
                            }}>{isRefineLoading ? "⟳" : "Pas toe →"}</button>
                            <button onClick={() => { setRefining(null); setRefineInput(prev => ({ ...prev, [i]: "" })); }} style={{
                              background: "none", border: "1px solid #2a2a35", borderRadius: "2px",
                              color: "#555", fontSize: "11px", padding: "6px 10px", cursor: "pointer", fontFamily: "inherit",
                            }}>Annuleer</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {!result && !loading && !error && (
              <div style={{ color: "#333", fontSize: "13px", textAlign: "center", paddingTop: "40px" }}>
                Voer een onderwerp in om pollvragen te genereren
              </div>
            )}
          </div>

          {/* Right: historical polls */}
          {related.length > 0 && (
            <div>
              <div style={s.label}>Eerder gestelde polls over dit onderwerp</div>
              {related.map(poll => {
                const bal = getBalanceLabel(poll.answers);
                return (
                  <div key={poll.id} style={s.histCard}>
                    {/* Date + votes */}
                    <div style={{ fontSize: "10px", color: "#555", marginBottom: "6px", letterSpacing: "0.5px" }}>
                      {poll.date} &nbsp;·&nbsp; {poll.total.toLocaleString()} stemmen
                    </div>
                    {/* Full question (not the short title) */}
                    <div style={{ fontSize: "13px", color: "#d8d0c0", fontWeight: "bold", lineHeight: 1.45, marginBottom: "10px" }}>
                      {poll.question}
                    </div>
                    {/* Answers with bars + percentages */}
                    <div>
                      {poll.answers.map((ans, j) => (
                        <div key={j} style={{ marginBottom: "7px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "3px" }}>
                            <span style={{ fontSize: "12px", color: "#a09888", maxWidth: "78%", lineHeight: 1.3 }}>{ans.label}</span>
                            <span style={{ fontSize: "12px", color: "#c8a84b", fontWeight: "bold", whiteSpace: "nowrap", marginLeft: "6px" }}>{ans.pct}%</span>
                          </div>
                          <div style={{ background: "#1e1e28", borderRadius: "2px", height: "7px", overflow: "hidden" }}>
                            <div style={{
                              width: `${ans.pct}%`,
                              height: "100%",
                              background: j === 0 ? "#c8a84b" : j === 1 ? "#4a4a6a" : "#3a3a55",
                              transition: "width 0.4s ease",
                            }} />
                          </div>
                        </div>
                      ))}
                    </div>
                    {/* Balance label */}
                    <div style={{ marginTop: "10px", paddingTop: "8px", borderTop: "1px solid #1e1e28", display: "flex", alignItems: "center", gap: "6px" }}>
                      <span style={{ color: bal.color, fontSize: "11px", fontWeight: "bold" }}>{bal.emoji} Uitslag: {bal.text}</span>
                    </div>
                  </div>
                );
              })}
              <div style={{ fontSize: "11px", color: "#3a3a4a", marginTop: "8px" }}>
                {HISTORISCHE_POLLS.length} polls in archief
              </div>
            </div>
          )}
        </div>
        </>}
      </div>
    </div>
  );
}


window.addEventListener('load', () => {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<PollGenerator />);
});
</script>

</body>
</html>
